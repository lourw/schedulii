name: Execute Frontend CI
on: 
  pull_request:
    paths:
    - 'frontend/**'

jobs:
  frontend:
    defaults:
      run:
        working-directory: frontend

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 16

      - name: Install Dependencies
        run: npm install

      - name: Run Linters
        run: npm run lint

      - name: Run Tests
        run: npm run test
